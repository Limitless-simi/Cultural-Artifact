<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cultural AR Artefact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ground:     #0D0A07;
      --card:       #1A1208;
      --brown:      #3B1F0A;
      --gold:       #C8860A;
      --gold-light: #E8B84B;
      --parchment:  #E8D5B0;
      --muted:      #8A7560;
      --text:       #D4C09A;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ground);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 120px;
      overflow: hidden;
    }

    .hero-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      opacity: 0.8;
    }

    .hero-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.2rem, 5.5vw, 4.4rem);
      font-weight: 400;
      color: var(--parchment);
      text-align: center;
      line-height: 1.08;
      max-width: 820px;
      margin-bottom: 12px;
    }

    .hero-subtitle {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(0.95rem, 1.8vw, 1.1rem);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-align: center;
      margin-bottom: 64px;
    }

    /* ─── AUREOLE + AR VIEWER ─── */
    .ar-stage {
      position: relative;
      width: min(520px, 90vw);
      aspect-ratio: 9/14;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .aureole {
      position: absolute;
      inset: -32px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(200,134,10,0.12) 20%,
        rgba(232,184,75,0.22) 50%,
        rgba(200,134,10,0.12) 80%,
        transparent 100%
      );
      animation: spin 18s linear infinite;
      pointer-events: none;
    }

    .aureole::after {
      content: '';
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(200,134,10,0.18);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 0.8; transform: scale(1.02); }
    }

    .ar-frame-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: var(--card);
      box-shadow:
        0 0 0 1px rgba(200,134,10,0.2),
        0 24px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(200,134,10,0.06);
    }

    .ar-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ─── SCROLL CUE ─── */
    .scroll-cue {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.45;
      animation: bob 2.4s ease-in-out infinite;
    }
    .scroll-cue span {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .scroll-cue svg { color: var(--gold); }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    /* ─── STORY SECTION ─── */
    .story {
      max-width: 680px;
      margin: 0 auto;
      padding: 100px 28px 160px;
    }

    .section-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 32px;
    }

    .story-body p {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 1.5em;
    }

    .story-body p:first-child::first-letter {
      font-family: 'Archivo Black', sans-serif;
      font-size: 3.2em;
      font-weight: 400;
      color: var(--gold);
      float: left;
      line-height: 0.8;
      margin: 0.08em 0.1em 0 0;
    }

    .story-divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      opacity: 0.35;
      margin: 48px 0;
    }

    .story-quote {
      border-left: 2px solid var(--gold);
      padding-left: 24px;
      margin: 40px 0;
    }
    .story-quote p {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(1.15rem, 2.4vw, 1.4rem) !important;
      font-style: italic;
      color: var(--parchment) !important;
      line-height: 1.65 !important;
    }
    .story-quote cite {
      display: block;
      font-family: 'Courier Prime', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-top: 12px;
    }

    /* ─── MUSIC PLAYER ─── */
    .music-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(13,10,7,0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(200,134,10,0.15);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 100;
    }

    .music-play-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    .music-play-btn:hover { background: var(--gold); color: var(--ground); }

    .music-info {
      flex: 1;
      min-width: 0;
    }
    .music-track-name {
      font-family: 'Crimson Pro', serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--parchment);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-artist {
      font-family: 'Courier Prime', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .music-progress-wrap {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .music-progress {
      width: 100%;
      height: 2px;
      background: var(--brown);
      border-radius: 2px;
      appearance: none;
      cursor: pointer;
      accent-color: var(--gold);
    }
    .music-time {
      font-family: 'Courier Prime', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .music-vol-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .music-vol-btn:hover { color: var(--gold); }

    .music-vol-slider {
      width: 68px;
      height: 2px;
      appearance: none;
      background: var(--brown);
      border-radius: 2px;
      accent-color: var(--gold);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* no source state */
    .music-no-src {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ─── GRAIN ─── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .music-progress-wrap { display: none; }
      .music-vol-slider    { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .aureole, .scroll-cue { animation: none; }
    }
  </style>
</head>
<body>

<div class="grain"></div>

<!-- ╔══════════════════════════════════════════════════════════╗
     ║            CONFIG — edit freely                         ║
     ╚══════════════════════════════════════════════════════════╝ -->
<script>
const CONFIG = {

  // ── PAGE IDENTITY ──────────────────────────────────────────
  pageLabel:    "Cultural Artefact · AR Experience",
  title:        "The Vessel of Memory",
  subtitle:     "An immersive encounter with a living object",

  // ── WEB-AR EMBED ───────────────────────────────────────────
  // Replace the entire src string below with your new embed URL
  arEmbedSrc: "https://projects.web-ar.studio/configurator/870b17b547/?id=2694488929_488938&is_transparent_bg=true&activate_ar=true",
  // Permissions the iframe needs (comma-separated)
  arPermissions: "camera;autoplay;xr-spatial-tracking",

  // ── STORY CONTENT ──────────────────────────────────────────
  // Each paragraph is a separate string in the array.
  // Add, remove, or reorder as needed.
  story: [
    "Long before the archive, there was the object. Carved from memory and fired in silence, this vessel travelled across generations as both record and ritual — a thing that held not water but time itself. To hold it is to hold a conversation that never ended.",
    "The craftspeople who shaped these forms understood something the digital age is only beginning to rediscover: that an artefact is not a copy of experience but an extension of it. The body knows this. The hands know this first.",
    "In bringing this object into augmented space, we are not modernising it. We are asking what it already knew about the future — the way sacred things always do.",
  ],

  // ── PULL QUOTE ─────────────────────────────────────────────
  pullQuote: "The object does not belong to the past. It belongs to whoever is willing to look.",
  pullQuoteSource: "— Oral tradition, transcribed",

  // ── MUSIC ──────────────────────────────────────────────────
  // Paste a direct URL to an .mp3 or .ogg file, or leave empty ("") to hide the player
  musicSrc:    "",
  musicTrack:  "Echoes of the Compound",
  musicArtist: "Unknown · Field Recording, Lagos 1974",

};
</script>
<!-- ╚══════════════════════════════════════════════════════════╝ -->


<!-- HERO -->
<section class="hero">
  <p class="hero-label" id="js-label"></p>
  <h1 class="hero-title" id="js-title"></h1>
  <p class="hero-subtitle" id="js-subtitle"></p>

  <div class="ar-stage">
    <div class="aureole"></div>
    <div class="ar-frame-wrap">
      <iframe
        id="js-ar-frame"
        src=""
        allowfullscreen
        allow=""
        style="border:none;"
      ></iframe>
    </div>
  </div>

  <div class="scroll-cue">
    <span>Read the story</span>
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 3v10M4 9l4 4 4-4"/>
    </svg>
  </div>
</section>

<!-- STORY -->
<section class="story">
  <p class="section-label">Origin &amp; Context</p>
  <div class="story-body" id="js-story"></div>
</section>

<!-- MUSIC PLAYER -->
<div class="music-bar" id="js-music-bar" style="display:none">
  <button class="music-play-btn" id="js-play-btn" aria-label="Play / Pause">
    <svg id="js-play-icon" width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
      <polygon points="3,1 13,7 3,13"/>
    </svg>
  </button>

  <div class="music-info">
    <div class="music-track-name" id="js-track-name"></div>
    <div class="music-artist" id="js-artist"></div>
  </div>

  <div class="music-progress-wrap">
    <input type="range" class="music-progress" id="js-progress" min="0" max="100" value="0" step="0.1" />
    <div class="music-time">
      <span id="js-cur">0:00</span>
      <span id="js-dur">0:00</span>
    </div>
  </div>

  <button class="music-vol-btn" id="js-mute-btn" aria-label="Toggle mute">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 3L5 6H2v4h3l4 3V3z"/>
      <path id="js-vol-wave" d="M11.5 5.5a3.5 3.5 0 0 1 0 5M13.5 3.5a6.5 6.5 0 0 1 0 9"/>
    </svg>
  </button>
  <input type="range" class="music-vol-slider" id="js-vol" min="0" max="1" step="0.05" value="0.8" />

  <audio id="js-audio" preload="metadata" loop></audio>
</div>


<script>
// ── Inject CONFIG into DOM ─────────────────────────────────────────────────────

// Page identity
document.getElementById('js-label').textContent    = CONFIG.pageLabel;
document.getElementById('js-title').textContent    = CONFIG.title;
document.getElementById('js-subtitle').textContent = CONFIG.subtitle;

// WebAR iframe
const frame = document.getElementById('js-ar-frame');
frame.src   = CONFIG.arEmbedSrc;
frame.allow = CONFIG.arPermissions;

// Story
const storyEl = document.getElementById('js-story');
CONFIG.story.forEach((para, i) => {
  const p = document.createElement('p');
  p.textContent = para;
  storyEl.appendChild(p);

  // Inject pull quote after second paragraph
  if (i === 1 && CONFIG.pullQuote) {
    const div  = document.createElement('div');
    div.className = 'story-quote';
    const qp   = document.createElement('p');
    qp.textContent = CONFIG.pullQuote;
    const cite = document.createElement('cite');
    cite.textContent = CONFIG.pullQuoteSource;
    div.appendChild(qp);
    div.appendChild(cite);
    storyEl.appendChild(div);
    const hr = document.createElement('div');
    hr.className = 'story-divider';
    storyEl.appendChild(hr);
  }
});

// ── Music Player ──────────────────────────────────────────────────────────────
const musicBar = document.getElementById('js-music-bar');

if (CONFIG.musicSrc) {
  musicBar.style.display = 'flex';

  document.getElementById('js-track-name').textContent = CONFIG.musicTrack;
  document.getElementById('js-artist').textContent     = CONFIG.musicArtist;

  const audio     = document.getElementById('js-audio');
  const playBtn   = document.getElementById('js-play-btn');
  const playIcon  = document.getElementById('js-play-icon');
  const progress  = document.getElementById('js-progress');
  const curEl     = document.getElementById('js-cur');
  const durEl     = document.getElementById('js-dur');
  const muteBtn   = document.getElementById('js-mute-btn');
  const volSlider = document.getElementById('js-vol');
  const volWave   = document.getElementById('js-vol-wave');

  audio.src    = CONFIG.musicSrc;
  audio.volume = parseFloat(volSlider.value);

  const fmt = s => {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  };

  const PLAY_ICON = `<polygon points="3,1 13,7 3,13"/>`;
  const PAUSE_ICON = `<rect x="2" y="1" width="4" height="12"/><rect x="8" y="1" width="4" height="12"/>`;

  let playing = false;

  playBtn.addEventListener('click', () => {
    if (playing) {
      audio.pause();
      playIcon.innerHTML = PLAY_ICON;
    } else {
      audio.play().catch(() => {});
      playIcon.innerHTML = PAUSE_ICON;
    }
    playing = !playing;
  });

  audio.addEventListener('loadedmetadata', () => {
    durEl.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progress.value = pct;
    curEl.textContent = fmt(audio.currentTime);
  });

  progress.addEventListener('input', () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
  });

  let muted = false;
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    audio.muted = muted;
    volWave.style.opacity = muted ? '0.2' : '1';
  });

  volSlider.addEventListener('input', () => {
    audio.volume = parseFloat(volSlider.value);
    if (audio.volume > 0) { muted = false; audio.muted = false; }
  });
}
</script>
</body>
</html>
