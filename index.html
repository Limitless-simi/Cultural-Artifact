<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Queen Idia Mask · FESTAC ’77</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>

<div class="grain"></div>

<!-- HERO -->
<section class="hero">
  <p class="hero-label" id="js-label"></p>
  <h1 class="hero-title" id="js-title"></h1>
  <p class="hero-subtitle" id="js-subtitle"></p>

  <!-- MUSIC PLAYER -->
  <div class="music-bar" id="js-music-bar" style="display:none">
    <button class="music-play-btn" id="js-play-btn" aria-label="Play / Pause">
      <svg id="js-play-icon" width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <polygon points="3,1 13,7 3,13"/>
      </svg>
    </button>

    <div class="music-info">
      <div class="music-track-name" id="js-track-name"></div>
      <div class="music-artist" id="js-artist"></div>
    </div>

    <div class="music-progress-wrap">
      <input type="range" class="music-progress" id="js-progress" min="0" max="100" value="0" step="0.1" />
      <div class="music-time">
        <span id="js-cur">0:00</span>
        <span id="js-dur">0:00</span>
      </div>
    </div>

    <button class="music-vol-btn" id="js-mute-btn" aria-label="Toggle mute">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 3L5 6H2v4h3l4 3V3z"/>
        <path id="js-vol-wave" d="M11.5 5.5a3.5 3.5 0 0 1 0 5M13.5 3.5a6.5 6.5 0 0 1 0 9"/>
      </svg>
    </button>
    <input type="range" class="music-vol-slider" id="js-vol" min="0" max="1" step="0.05" value="0.8" />

    <audio id="js-audio" preload="metadata" loop></audio>
  </div>

  <div class="ar-stage">
    <div class="aureole"></div>
    <div class="ar-frame-wrap">
      <iframe
        id="js-ar-frame"
        src=""
        allowfullscreen
        allow=""
        style="border:none;"
      ></iframe>
    </div>
  </div>

  <div class="scroll-cue">
    <span>Read the story</span>
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 3v10M4 9l4 4 4-4"/>
    </svg>
  </div>
</section>

<!-- STORY -->
<section class="story">
  <p class="section-label">Origin &amp; Context</p>
  <div class="story-body" id="js-story"></div>
</section>

</body>
</html>
